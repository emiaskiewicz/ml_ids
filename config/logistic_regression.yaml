experiment:
  name: "lr_easy_binary"
  random_state: 23

data:
  input_dir: "data/cleaned"
  dataset_variant: "easy"
  target_column: "Target"
  label_column: "Label"
  load_existing_prepared_data: false
  save_prepared_data: true
  prepared_data_dir: "data/prepared/logistic_regression/easy"

split:
  test_size: 0.2
  val_size: 0.1
  stratify: true
  load_existing_split: false
  save_split: true
  force_regenerate_split: false
  split_dir: "data/processed/logistic_regression/easy"

features:
  drop_columns:
    - "Label"
  remove_correlated_features: true
  correlation_threshold: 0.95
  use_feature_selection: true
  feature_selection_method: "rfe"
  selected_k_features: 40

preprocessing:
  smote: false
  scaling: true
  scaler: "standard"

model:
  max_iter: 1000
  solver: "lbfgs"
  class_weight: null

output:
  output_dir: "outputs/logistic_regression/easy"
  save_metrics: false
  save_predictions: false
  save_model: false

logging:
  log_path: "logs/logistic_regression/easy_exp1.log"
  log_level: "INFO"