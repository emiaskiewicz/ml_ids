experiment:
  name: "SVM-01m"
  random_state: 23

data:
  input_dir: "data/cleaned"
  dataset_variant: "medium"
  target_column: "Target"
  label_column: "Label"

split:
  test_size: 0.2
  val_size: 0.1
  stratify: true
  load_existing_split: true
  split_dir: "data/split/medium/"

features:
  drop_columns:
    - "Label"
  remove_correlated_features: false
  correlation_threshold: 0.95
  use_feature_selection: false
  feature_selection_method: "select_k_best" #"rfe"
  selected_k_features: 40

preprocessing:
  smote: false
  scaling: true
  scaler: "standard"

model:
  C: 1.0
  loss: "squared_hinge"
  penalty: "l2"
  dual: false
  tol: 0.0001
  max_iter: 5000
  class_weight: null
  decision_threshold: 0.0

tuning_stage_1:
  enabled: false
  C_values: [0.01, 0.1, 1.0, 10.0, 100.0]
  loss_values: ["squared_hinge"]
  penalty_values: ["l2"]
  dual_values: [false]
  tol_values: [0.001, 0.0001]
  class_weight_values: [null, "balanced"]

tuning_stage_2:
  enabled: false
  metric: f1
  threshold_values: [-3.0, -2.5, -2.0, -1.5, -1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0]

output:
  output_dir: "outputs/svm/medium/SVM-01m"
  summary_path: "outputs/svm/medium/svm_m_results_sum.csv"
  save_metrics: true
  save_plots: true
  save_predictions: false
  save_model: false
  save_tuning_results: true
  save_best_config: true

logging:
  log_path: "logs/svm/medium/SVM-01m.log"
  log_level: "INFO"